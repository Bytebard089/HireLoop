services:
  - type: web
    name: hireloop-api
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt && python ml/dataset.py && python ml/trainer.py && python db/seed.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 180
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FLASK_ENV
        value: production
      - key: RAG_ENABLED
        value: "0"
